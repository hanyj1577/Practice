<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영어 발음 퀴즈 서비스</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .hidden { display: none; }
        .word-title { font-size: 2.5rem; font-weight: bold; margin: 20px 0; color: #2d3436; }
        .options { display: grid; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-primary { background: #0984e3; color: white; width: 100%; margin-top: 10px; }
        .btn-audio { background: #6c5ce7; color: white; flex: 1; }
        .btn-success { background: #00b894; color: white; flex: 1; }
        .btn-skip { background: #fab1a0; color: #d63031; width: 100%; margin-top: 10px; font-size: 0.9rem; }
        .opt-btn { background: #e0e0e0; }
        .opt-btn:hover { background: #d0d0d0; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .status { margin: 15px 0; font-weight: bold; min-height: 3em; line-height: 1.4; }
        #fileInput { margin: 20px 0; border: 1px dashed #ccc; padding: 20px; width: 80%; }
        .info-text { font-size: 0.85rem; color: #636e72; margin-bottom: 10px; line-height: 1.6; }
        .sample-link { color: #0984e3; text-decoration: none; font-weight: bold; }
        .guide-box { background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem; color: #636e72; }
        
        /* 오답 리스트 스타일 */
        .wrong-list { text-align: left; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; max-height: 200px; overflow-y: auto; }
        .wrong-item { margin-bottom: 8px; font-size: 0.95rem; color: #d63031; }
        .wrong-item b { color: #2d3436; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-view">
        <h2>단어장 불러오기</h2>
        <div class="info-text">
            <a href="단어.txt" class="sample-link" download>샘플 다운로드</a><br>
            💡 샘플처럼 여러분이 단어장 파일을 직접 만들어서 사용 할 수 있어요. <br>
        </div>
        <input type="file" id="fileInput" accept=".txt">
        <button class="btn-primary" onclick="loadFile()">게임 시작</button>
        <div class="info-text" style="margin-top:15px;">
            Edge나 Chrome 브라우저에서만 음성인식이 가능합니다. <br>
            마이크를 켜주세요.
        </div>
    </div>

    <div id="quiz-view" class="hidden">
        <div id="progress">1 / 10</div>
        <div id="q-meaning" style="font-size: 1.5rem; margin: 20px 0; font-weight: bold;">뜻</div>
        <div class="options" id="q-options"></div>
        <div class="guide-box">💡 뜻에 해당하는 단어를 선택해 주세요.</div>
    </div>

    <div id="result-view" class="hidden">
        <div id="feedbackText" style="font-weight: bold;"></div>
        <div class="word-title" id="correct-word">Word</div>
        <div class="btn-group">
            <button class="btn-audio" onclick="playVoice()">🔊 듣기</button>
            <button class="btn-success" onclick="startSTT()">🎤 체크</button>
        </div>
        <br>
        <div id="stt-status" class="status">발음을 체크해주세요.</div>
        <button class="btn-primary" id="next-btn" onclick="confirmNext(true)" disabled>다음 문제로 (+5점)</button>
        <button class="btn-skip" onclick="confirmNext(false)">포기하고 넘어가기 (0점)</button>
        <div class="info-text" style="margin-top: 15px;">
            💡 발음 인식이 안 될 때는 <b>체크</b> 버튼을 다시 눌러 보세요.
        </div>
    </div>

    <div id="final-view" class="hidden">
        <h2>학습 완료!</h2>
        <div id="final-score" style="font-size: 2.5rem; margin: 20px 0; color: #0984e3;"></div>
        <div id="wrong-container" class="hidden">
            <h3 style="font-size: 1.1rem; text-align: left;">복습이 필요한 단어:</h3>
            <div id="wrong-list" class="wrong-list"></div>
        </div>
        <button class="btn-primary" onclick="location.reload()">다시 시작하기</button>
    </div>
</div>

<script>
    let allWords = [], currentQuiz = [], currentIndex = 0, score = 0, currentWord = "";
    let isPronounced = false; 
    let wrongWords = []; // 오답 저장 배열

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = true;

    function loadFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("파일을 선택해주세요.");
        const reader = new FileReader();
        reader.onload = (e) => parseData(e.target.result);
        reader.readAsText(file);
    }

    function parseData(text) {
        allWords = text.split('\n').map(l => l.trim()).filter(l => l.includes(' ')).map(l => {
            const idx = l.indexOf(' ');
            return { word: l.substring(0, idx).trim(), mean: l.substring(idx).trim() };
        });
        if (allWords.length < 4) return alert("단어가 부족합니다.");
        currentQuiz = allWords.sort(() => 0.5 - Math.random()).slice(0, 10);
        showQuiz();
    }

    function showQuiz() {
        isPronounced = false; 
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('result-view').classList.add('hidden');
        document.getElementById('quiz-view').classList.remove('hidden');
        
        const q = currentQuiz[currentIndex];
        currentWord = q.word;
        document.getElementById('progress').innerText = `${currentIndex + 1} / ${currentQuiz.length}`;
        document.getElementById('q-meaning').innerText = q.mean;

        let opts = [q.word];
        while(opts.length < 4) {
            let r = allWords[Math.floor(Math.random()*allWords.length)].word;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => 0.5 - Math.random());

        const container = document.getElementById('q-options');
        container.innerHTML = '';
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const isCorrect = opt === currentWord;
                if(isCorrect) {
                    score += 5;
                } else {
                    // 틀렸을 경우 오답 배열에 추가 (중복 방지)
                    if(!wrongWords.find(w => w.word === q.word)) {
                        wrongWords.push(q);
                    }
                }
                showResult(isCorrect, q.mean);
            };
            container.appendChild(btn);
        });
    }

    function showResult(isCorrect, meaning) {
        document.getElementById('quiz-view').classList.add('hidden');
        document.getElementById('result-view').classList.remove('hidden');
        document.getElementById('feedbackText').innerText = isCorrect ? "✅ 단어 정답! (+5점)" : "❌ 단어 오답 (+0점)";
        document.getElementById('feedbackText').style.color = isCorrect ? "#00b894" : "#d63031";
        document.getElementById('correct-word').innerHTML = `${currentWord}<div style="font-size: 1.1rem; color: #636e72; font-weight: normal; margin-top: 8px;">${meaning}</div>`;
        document.getElementById('stt-status').innerText = "발음을 통과해야 다음 문제로 갈 수 있습니다.";
        document.getElementById('next-btn').disabled = true;
        playVoice();        
    }

    var isRestart = true;

    function playVoice() {
        try { 
            isRestart = true;
            recognition.stop(); 
        } catch(e) {}
        document.getElementById('stt-status').innerText = "발음 들어보기"; 
        const uttr = new SpeechSynthesisUtterance(currentWord);
        uttr.lang = 'en-US';
        uttr.rate = 0.8; 
        uttr.pitch = 1.0; 
        uttr.onend = () => { 
            document.getElementById('stt-status').innerText = "이제 발음해 보세요!"; 
            startSTT();
        };
        window.speechSynthesis.speak(uttr);
    }

    function startSTT() {
        try { 
            isRestart = true;
            recognition.stop(); 
        } catch(e) {}
        isPronounced = false; 
        setTimeout(() => { 
            try { 
                recognition.start(); 
                document.getElementById('stt-status').innerText = "듣고 있습니다...";
                isRestart = false;
            } catch(e) {}
        }, 300);

        recognition.onend = () => {
            if (!isPronounced && !isRestart) {
                document.getElementById('stt-status').innerHTML = 
                    `<span style="color:#d63031">인식 시간이 만료되었습니다.<br><b>🎤 체크</b> 버튼을 다시 눌러주세요.</span>`;
            }
        };
        
        recognition.onresult = (e) => {
            let wordSet = new Set();
            for (let i = 0; i < e.results.length; ++i) {
                let transcript = e.results[i][0].transcript.replace(/[\.,]/g, '').toLowerCase();
                transcript.trim().split(/\s+/).forEach(w => {
                    if(w) wordSet.add(w);
                });
            }
            const resultWords = [...wordSet];
            const result = resultWords.join(' ');
            const targetOnlyAlpha = currentWord.toLowerCase().replace(/[^a-z]/g, '');
            if (!isPronounced) {
                document.getElementById('stt-status').innerHTML = `인식 중: <span style="color: #0984e3;">${result}</span>`;
            }
            if (targetOnlyAlpha !== "" && resultWords.includes(targetOnlyAlpha)) {
                isPronounced = true;
                document.getElementById('stt-status').innerHTML = `최종 인식: <b>${result}</b><br><span style="color:#00b894">✔ 발음 통과! [다음 문제로]를 눌러주세요.</span>`;
                document.getElementById('next-btn').disabled = false;
                setTimeout(() => { recognition.stop(); }, 100);
            }
        };
    }

    function confirmNext(addPronunciationScore) {
        try { recognition.stop(); } catch(e) {}
        if (addPronunciationScore && isPronounced) {
            score += 5;
        }

        currentIndex++;
        if(currentIndex < currentQuiz.length) {
            showQuiz();
        } else {
            document.getElementById('result-view').classList.add('hidden');
            document.getElementById('final-view').classList.remove('hidden');
            document.getElementById('final-score').innerText = `최종 점수: ${score} / 100 점`;
            
            // 오답 리스트 표시 처리
            if(wrongWords.length > 0) {
                const listContainer = document.getElementById('wrong-list');
                const containerView = document.getElementById('wrong-container');
                listContainer.innerHTML = '';
                wrongWords.forEach(w => {
                    const item = document.createElement('div');
                    item.className = 'wrong-item';
                    item.innerHTML = `• <b>${w.word}</b> : ${w.mean}`;
                    listContainer.appendChild(item);
                });
                containerView.classList.remove('hidden');
            }
        }
    }
</script>
</body>
</html>
